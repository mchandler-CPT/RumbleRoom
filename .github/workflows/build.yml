name: Build RumbleRoom

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-plugin:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: cmake -B build -G Xcode -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin target
        shell: pwsh
        run: cmake --build build --config Release --target RumbleRoom_All

      - name: Import signing certificates (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MACOS_APP_CERT: ${{ secrets.MACOS_APP_CERT }}
          MACOS_INSTALL_CERT: ${{ secrets.MACOS_INSTALL_CERT }}
          MACOS_CERT_PWD: ${{ secrets.MACOS_CERT_PWD }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_APP_CERT}" ] || [ -z "${MACOS_INSTALL_CERT}" ] || [ -z "${MACOS_CERT_PWD}" ]; then
            echo "Required macOS signing secrets are missing."
            exit 1
          fi
          APP_CERT_PATH="$RUNNER_TEMP/macos_app_cert.p12"
          INSTALL_CERT_PATH="$RUNNER_TEMP/macos_install_cert.p12"
          KEYCHAIN_PATH="${HOME}/Library/Keychains/build.keychain-db"
          echo "${MACOS_APP_CERT}" | base64 --decode > "${APP_CERT_PATH}"
          echo "${MACOS_INSTALL_CERT}" | base64 --decode > "${INSTALL_CERT_PATH}"
          security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true
          security create-keychain -p "${MACOS_CERT_PWD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${MACOS_CERT_PWD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security import "${APP_CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PWD}" \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          security import "${INSTALL_CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PWD}" \
            -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: \
            -s -k "${MACOS_CERT_PWD}" "${KEYCHAIN_PATH}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install innosetup -y

      - name: Stage for Installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $dist = 'installer_dist'
          $rumbleRoomVst3 = Join-Path $dist 'RumbleRoom.vst3'
          New-Item -ItemType Directory -Path $dist -Force | Out-Null
          $vst3Root = 'build/RumbleRoom_artefacts/Release/VST3'
          $bundle = Get-ChildItem -LiteralPath $vst3Root -Directory -Filter '*.vst3' | Select-Object -First 1
          if (-not $bundle) { throw "No .vst3 bundle found under $vst3Root" }
          if (Test-Path -LiteralPath $rumbleRoomVst3) { Remove-Item -LiteralPath $rumbleRoomVst3 -Recurse -Force }
          New-Item -ItemType Directory -Path $rumbleRoomVst3 -Force | Out-Null
          Get-ChildItem -LiteralPath $bundle.FullName -Force | Copy-Item -Destination $rumbleRoomVst3 -Recurse -Force
          if (Test-Path -LiteralPath 'Presets') {
            $presetsDst = Join-Path $dist 'Presets'
            if (Test-Path -LiteralPath $presetsDst) { Remove-Item -LiteralPath $presetsDst -Recurse -Force }
            Copy-Item -LiteralPath 'Presets' -Destination $presetsDst -Recurse -Force
          }
          if (Test-Path -LiteralPath 'README.pdf') {
            Copy-Item -LiteralPath 'README.pdf' -Destination $dist -Force
          }

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path Output -Force | Out-Null
          iscc RumbleRoom_Installer.iss

      - name: Code sign macOS plugin bundles
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MACOS_CERT_PWD: ${{ secrets.MACOS_CERT_PWD }}
        run: |
          set -euo pipefail
          APP_IDENTITY="$(security find-identity -v -p codesigning | awk -F\" '/Developer ID Application:/{print $2; exit}')"
          if [ -z "${APP_IDENTITY}" ]; then
            echo "Developer ID Application identity not found."
            exit 1
          fi
          for vst3 in build/RumbleRoom_artefacts/Release/VST3/*.vst3; do
            codesign --force --deep --timestamp --options runtime \
                     --entitlements Source/entitlements.plist \
                     --sign "${APP_IDENTITY}" "${vst3}"
            codesign --verify --deep --strict --verbose=2 "${vst3}"
          done
          for component in build/RumbleRoom_artefacts/Release/AU/*.component; do
            codesign --force --deep --timestamp --options runtime \
                     --entitlements Source/entitlements.plist \
                     --sign "${APP_IDENTITY}" "${component}"
            codesign --verify --deep --strict --verbose=2 "${component}"
          done

      - name: Build, sign, notarize, and staple macOS pkg
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          MACOS_CERT_PWD: ${{ secrets.MACOS_CERT_PWD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_ID_PWD}" ] || [ -z "${TEAM_ID}" ]; then
            echo "Required notarization secrets are missing."
            exit 1
          fi
          if [ -z "${MACOS_CERT_PWD}" ]; then
            echo "MACOS_CERT_PWD secret is missing."
            exit 1
          fi

          KEYCHAIN_PATH="${KEYCHAIN_PATH:-${HOME}/Library/Keychains/build.keychain-db}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security unlock-keychain -p "${MACOS_CERT_PWD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: \
            -s -k "${MACOS_CERT_PWD}" "${KEYCHAIN_PATH}"

          INSTALLER_IDENTITY="$(security find-identity -v -p basic | awk -F\" '/Developer ID Installer:/{print $2; exit}')"
          if [ -z "${INSTALLER_IDENTITY}" ]; then
            echo "Developer ID Installer identity not found."
            exit 1
          fi

          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            VERSION="1.0.0"
          fi

          VST3_COMPONENT="$(ls -d build/RumbleRoom_artefacts/Release/VST3/*.vst3 | head -n 1)"
          AU_COMPONENT="$(ls -d build/RumbleRoom_artefacts/Release/AU/*.component | head -n 1)"

          if [ -z "${VST3_COMPONENT}" ] || [ -z "${AU_COMPONENT}" ]; then
            echo "Expected VST3/AU build outputs were not found."
            exit 1
          fi

          pkgbuild --component "${VST3_COMPONENT}" \
                   --identifier com.bdenergy.rumbleroom.vst3 \
                   --version "${VERSION}" \
                   --install-location /Library/Audio/Plug-Ins/VST3 \
                   dist/RumbleRoom_VST3.pkg

          pkgbuild --component "${AU_COMPONENT}" \
                   --identifier com.bdenergy.rumbleroom.au \
                   --version "${VERSION}" \
                   --install-location /Library/Audio/Plug-Ins/Components \
                   dist/RumbleRoom_AU.pkg

          productbuild --synthesize \
                       --package dist/RumbleRoom_VST3.pkg \
                       --package dist/RumbleRoom_AU.pkg \
                       dist/Distribution.xml

          productbuild --distribution dist/Distribution.xml \
                       --package-path dist \
                       --sign "${INSTALLER_IDENTITY}" \
                       dist/RumbleRoom_Installer_Signed.pkg

          xcrun notarytool submit dist/RumbleRoom_Installer_Signed.pkg \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_ID_PWD}" \
            --team-id "${TEAM_ID}" \
            --wait

          xcrun stapler staple dist/RumbleRoom_Installer_Signed.pkg

      - name: Remote Plugin Validation (AU)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="/Library/Audio/Plug-Ins/Components"
          sudo rm -rf "$TARGET_DIR/RumbleRoom.component"
          sudo mkdir -p "$TARGET_DIR"
          sudo cp -R build/RumbleRoom_artefacts/Release/AU/RumbleRoom.component "$TARGET_DIR/"
          sudo xattr -cr "$TARGET_DIR/RumbleRoom.component"

          echo "--- Internal Plist Check ---"
          plutil -p "$TARGET_DIR/RumbleRoom.component/Contents/Info.plist" | grep -A 15 "AudioComponents"

          sudo pluginkit -a "$TARGET_DIR/RumbleRoom.component"
          sudo killall -9 AudioComponentRegistrar || echo "Registrar not running"
          sleep 10

          # RumbleRoom: aufx = Audio Unit effect, RmRm = subtype, bdEn = manufacturer (CMakeLists.txt)
          sudo auval -v aufx RmRm bdEn

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumbleroom-macos
          path: dist/RumbleRoom_Installer_Signed.pkg
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rumbleroom-windows-build
          path: Output/RumbleRoom_Setup.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-plugin
    runs-on: ubuntu-latest
    steps:
      # 1. Explicitly download the macOS build binary file
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: rumbleroom-macos
          path: dist

      # 2. Explicitly download the Windows setup installer file
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: rumbleroom-windows-build
          path: dist

      # 3. Clean up names if they got nested inside sub-folders
      - name: Prepare release asset paths
        shell: bash
        run: |
          set -euo pipefail
          # Flatten any nested folders if download-artifact grouped them
          find dist -type f -name "RumbleRoom_Installer_Signed.pkg" -exec cp {} dist/RumbleRoom_Installer_Signed.pkg \; 2>/dev/null || true
          find dist -type f -name "RumbleRoom_Setup.exe" -exec cp {} dist/RumbleRoom_Setup.exe \; 2>/dev/null || true
          echo "--- Staged Release Assets ---"
          ls -lah dist/

      # 4. Ship the master bundles to your public release page
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/RumbleRoom_Installer_Signed.pkg
            dist/RumbleRoom_Setup.exe
